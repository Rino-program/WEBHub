<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お知らせ一覧 - Rino-program</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="notices-style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <h1 class="nav-title"><a href="../index.html" style="color: inherit; text-decoration: none;">Rino-program</a></h1>
            <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
            <ul class="nav-menu" id="navMenu">
                <li><a href="../index.html#notice" class="nav-link">お知らせ</a></li>
                <li><a href="../index.html#profile" class="nav-link">プロフィール</a></li>
                <li><a href="../index.html#skills" class="nav-link">スキル・経験</a></li>
                <li><a href="../index.html#timeline" class="nav-link">年表</a></li>
                <li><a href="../index.html#links" class="nav-link">リンク</a></li>
                <li><a href="../index.html#contact" class="nav-link">連絡先</a></li>
                <li><a href="../notice.html" class="nav-link">注意事項</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <header class="header-section">
            <h1>お知らせ一覧</h1>
        </header>

        <section class="content-section">
            <div id="noticesList" class="notices-list">
                <!-- JS will populate the full list from data.json -->
            </div>
            <div style="margin-top:16px;"><a href="../index.html#notice">トップに戻る</a></div>
        </section>
    </main>

    <script>
    async function renderNoticesList() {
        try {
            const res = await fetch('data.json');
            if (!res.ok) return;
            const data = await res.json();
            const notices = Array.isArray(data.notices) ? data.notices : [];
            const container = document.getElementById('noticesList');
            container.innerHTML = '';
            notices.forEach(n => {
                // make the whole card clickable
                const link = document.createElement('a');
                link.className = 'notice-card-link';
                link.href = n.detailPage ? n.detailPage : '#';

                const card = document.createElement('article');
                card.className = 'notice-card';
                const title = document.createElement('h3');
                title.textContent = n.title + ' ' + (n.date ? ('(' + n.date + ')') : '');
                const preview = document.createElement('div');
                preview.className = 'notice-preview';
                preview.innerHTML = n.preview || '';

                card.appendChild(title);
                card.appendChild(preview);
                link.appendChild(card);
                container.appendChild(link);
            });
        } catch (e) {
            console.error('cannot load notices', e);
        }
    }
    document.addEventListener('DOMContentLoaded', renderNoticesList);
    </script>
</body>
</html>
